site_name: Knowledge Base para Restaurantes
site_url: https://davidlopezg.github.io/restaurant-knowledge-base/
site_description: Base de conocimiento colaborativa para profesionales de la restauración. Manuales, guías operativas y asistente IA.
site_author: David López García

repo_name: davidlopezg/restaurant-knowledge-base
repo_url: https://github.com/davidlopezg/restaurant-knowledge-base
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  font:
    text: Inter
    heading: Newsreader
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/davidlopezg
  generator: false

nav:
  - Inicio: index.md
  - Manuales:
      - Apertura: manuales/apertura.md
      - Operaciones diarias: manuales/operaciones-diarias.md
      - Finanzas básicas: manuales/finanzas-basicas.md
  - Sistemas:
      - Control de costes: sistemas/control-costes.md
      - Gestión de equipo: sistemas/gestion-equipo.md
  - Skills:
      - Atención al cliente: skills/atencion-cliente.md
      - Resolución de conflictos: skills/resolucion-conflictos.md
  - Agentes:
      - Preguntas frecuentes: agentes/preguntas-frecuentes.md
  - Asistente IA:
      - Probar asistente: chat.html

plugins:
  - search:
      prebuild_index: true
      indexing: full
      separator: '[\s\-\.]+'
  - mkdocs-simple-hooks:
      hooks:
        on_page_markdown: "plugin.on_page_markdown"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css
